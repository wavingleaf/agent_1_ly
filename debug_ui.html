<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Debug — agent_langchain_1_ly</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e;
  --accent:#58a6ff;--green:#3fb950;--orange:#d2991d;--purple:#a371f7;--red:#f85149;--cyan:#39d353}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex}
#chat{width:56%;display:flex;flex-direction:column;border-right:1px solid var(--border)}
#chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
#chat-header h2{font-size:1.1em}
#chat-header .badge{font-size:0.75em;padding:3px 10px;border-radius:12px;border:1px solid var(--accent);color:var(--accent)}
#mode-select{padding:5px 8px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.8em;cursor:pointer;outline:none}
#mode-select:focus{border-color:var(--accent)}
#mode-select.dst-mode{border-color:var(--orange);color:var(--orange)}
#mode-select.plan-mode{border-color:var(--purple);color:var(--purple)}
.thread-btn{padding:4px 10px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-size:0.78em;transition:.15s}
.thread-btn:hover{border-color:var(--accent);color:var(--accent)}
.thread-btn-new{font-weight:700;font-size:0.85em !important}
#thread-select{padding:4px 6px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.78em;cursor:pointer;outline:none;max-width:140px}
#thread-select:focus{border-color:var(--accent)}
#messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:90%;padding:12px 16px;border-radius:12px;font-size:0.9em;line-height:1.55;animation:fadeIn .25s}
.msg.human{align-self:flex-end;background:#1a3a2a;border:1px solid rgba(63,185,80,.3)}
.msg.ai{align-self:flex-start;background:#1a2a3c;border:1px solid rgba(88,166,255,.3)}
.msg.tool{align-self:flex-start;background:#1a1a2a;border:1px solid rgba(163,113,247,.3);font-size:0.78em;font-family:inherit}
.msg .label{font-size:0.75em;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.msg.human .label{color:var(--green)} .msg.ai .label{color:var(--accent)} .msg.tool .label{color:var(--purple)}
#input-area{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px}
#input-area input{flex:1;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.95em;outline:none}
#input-area input:focus{border-color:var(--accent)}
#input-area button{padding:12px 22px;background:var(--accent);border:none;border-radius:10px;color:#000;font-weight:700;cursor:pointer;font-size:0.95em}
#input-area button:hover{opacity:.85}#input-area button:disabled{opacity:.3}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#debug{width:44%;display:flex;flex-direction:column;overflow:hidden}
#debug-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
#debug-header h2{font-size:1.1em}
#debug-scroll{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px}
#graph-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;overflow:hidden;flex-shrink:0}
#graph-card .graph-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
#graph-card h3{font-size:0.82em;color:var(--muted)}
#graph-card .zoom-btns{display:flex;gap:3px}
#graph-card .zoom-btns button{width:26px;height:26px;border:1px solid var(--border);border-radius:5px;background:var(--card);color:var(--text);cursor:pointer;font-size:0.95em;font-weight:700;display:flex;align-items:center;justify-content:center;transition:.12s}
#graph-card .zoom-btns button:hover{background:#21262d;border-color:var(--accent)}
#graph-card .toggles{display:flex;align-items:center;gap:8px}
#graph-card .toggles label{font-size:0.7em;color:var(--muted);display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none}
#graph-card .toggles label input[type=checkbox]{accent-color:var(--accent);cursor:pointer}
#graph-canvas-wrap{position:relative;background:var(--bg);border-radius:6px;border:1px solid rgba(255,255,255,0.05);cursor:grab;height:220px}
#graph-canvas-wrap:active{cursor:grabbing}
#graph-canvas-wrap canvas{display:block}
#resize-handle{height:8px;background:var(--border);cursor:ns-resize;border-radius:4px;flex-shrink:0;margin:2px 0;transition:background .15s}
#resize-handle:hover{background:var(--accent)}
#stats{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;display:flex;gap:16px;font-size:0.75em;flex-shrink:0}
#stats .stat{display:flex;flex-direction:column}
#stats .stat .val{font-size:1.25em;font-weight:800;color:var(--accent)}
#stats .stat .lbl{color:var(--muted);font-size:0.82em}
#steps-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;flex:1;min-height:0;display:flex;overflow:hidden}
#steps-left{width:55%;overflow-y:auto;border-right:1px solid var(--border);display:flex;flex-direction:column}
#steps-left .tl-hdr{padding:8px 12px 4px;font-size:0.82em;color:var(--muted);flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.04)}
#steps-right{flex:1;overflow-y:auto;display:flex;flex-direction:column;padding:4px 0}
#steps-right .info-placeholder{color:var(--muted);font-size:0.78em;padding:20px;text-align:center}
.tl-step{display:flex;gap:8px;padding:7px 12px;font-size:0.78em;align-items:flex-start;cursor:pointer;border-radius:4px;transition:.1s;border:1px solid transparent;margin:1px 4px}
.tl-step:hover{background:rgba(255,255,255,0.03)}
.tl-step.selected{background:rgba(88,166,255,0.1);border-color:rgba(88,166,255,0.4)}
.tl-step.neighbor{background:rgba(255,255,255,0.015)}
.tl-step .tl-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7em;font-weight:700;flex-shrink:0;background:var(--bg);border:1px solid var(--border);color:var(--muted)}
.tl-step.selected .tl-num{background:var(--accent);border-color:var(--accent);color:#000}
.tl-step .tl-body{flex:1;line-height:1.4;min-width:0}
.tl-step .tl-body .tl-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail-item{padding:8px 14px;border-bottom:1px solid rgba(255,255,255,0.03)}
.detail-item .d-key{font-size:0.72em;color:var(--muted);margin-bottom:3px}
.detail-item .d-val{font-size:0.8em;font-family:'SF Mono',Consolas,monospace;line-height:1.5;word-break:break-all}
.detail-item .d-val.code{color:var(--accent)} .detail-item .d-val.result{color:var(--purple);max-height:300px;overflow-y:auto;white-space:pre-wrap;font-size:0.72em} .detail-item .d-val.text{color:var(--text)}
#raw-events summary{font-size:0.76em;color:var(--muted);cursor:pointer;padding:4px 0}
#raw-events pre{font-size:0.68em;color:var(--muted);max-height:140px;overflow-y:auto;margin-top:4px;padding:6px;background:var(--card);border-radius:4px;border:1px solid var(--border);white-space:pre-wrap;word-break:break-all}

/* ── Markdown 渲染样式 ── */
.content h3{font-size:1.05em;margin:12px 0 6px;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:4px}
.content h4{font-size:0.95em;margin:10px 0 4px;color:#d2a8ff}
.content strong{color:#f0c060;font-weight:700}
.content code{font-family:'SF Mono',Consolas,monospace;font-size:0.85em;background:rgba(110,118,129,0.2);padding:2px 6px;border-radius:4px;color:#f778ba}
.content pre{font-family:'SF Mono',Consolas,monospace;font-size:0.82em;background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:12px;margin:8px 0;overflow-x:auto;white-space:pre;line-height:1.45}
.content pre code{background:none;padding:0;font-size:inherit;color:var(--text)}
.content pre.ascii-art{border-style:dashed;color:var(--muted);font-size:0.78em;background:var(--bg)}
.content table{border-collapse:collapse;margin:8px 0;font-size:0.82em;width:100%}
.content table th{background:var(--card);border:1px solid var(--border);padding:6px 10px;text-align:left;font-weight:700;color:var(--accent)}
.content table td{border:1px solid var(--border);padding:5px 10px}
.content ul,.content ol{margin:6px 0;padding-left:22px}
.content li{margin:3px 0;line-height:1.5}
.content hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.content p{margin:4px 0;line-height:1.55}
.content .emoji{font-size:1.1em}
</style>
</head>
<body>

<div id="chat">
  <div id="chat-header"><h2>Agent Chat</h2><span class="badge">deepseek-v4-pro</span><select id="mode-select" onchange="onModeChange()"><option value="general">通用助手</option><option value="dst">DST 助手</option><option value="plan">Plan（占位）</option></select><span style="flex:1"></span><select id="thread-select" onchange="switchThread(this.value)" title="选择对话线程"></select><button class="thread-btn" onclick="renameThread()" title="重命名">✎</button><button class="thread-btn" onclick="deleteThread()" title="删除">🗑</button><button class="thread-btn thread-btn-new" onclick="newThread()" title="新建对话">＋</button><button class="thread-btn" onclick="exportThread()" title="导出当前对话">⬇</button><button class="thread-btn" onclick="importThread()" title="导入对话">⬆</button></div>
  <div id="messages"><div style="text-align:center;color:var(--muted);padding:40px;font-size:0.9em">输入一个问题试试<br>例如"现在几点？"或"帮我算 123*456"</div></div>
  <div id="input-area"><input id="user-input" placeholder="输入消息..." onkeydown="if(event.key==='Enter')send()"><button id="send-btn" onclick="send()">发送</button></div>
</div>

<div id="debug">
  <div id="debug-header"><h2>ReAct 过程追踪</h2><span style="font-size:0.7em;color:var(--muted)">拖拽分割条调整区域</span></div>
  <div id="debug-scroll">
    <div id="graph-card">
      <div class="graph-top">
        <h3>StateGraph 节点流转</h3>
        <div class="toggles">
          <label title="显示上一步的边和出发节点"><input type="checkbox" id="toggle-prev" checked onchange="_onToggleSave(LS_KEY_PREV, this)"> 显示上步</label>
          <label title="显示下一步的边和到达节点"><input type="checkbox" id="toggle-next" checked onchange="_onToggleSave(LS_KEY_NEXT, this)"> 显示下步</label>
        </div>
        <div class="zoom-btns">
          <button onclick="zoomGraph(1.3)" title="放大">+</button>
          <button onclick="zoomGraph(0.7)" title="缩小">-</button>
          <button onclick="resetView()" title="重置">⟲</button>
        </div>
      </div>
      <div id="graph-canvas-wrap"><canvas id="graph-canvas"></canvas></div>
    </div>
    <div id="resize-handle"></div>
    <div id="stats">
      <div class="stat"><span class="val" id="st-cycles">0</span><span class="lbl">循环</span></div>
      <div class="stat"><span class="val" id="st-tools">0</span><span class="lbl">工具调用</span></div>
      <div class="stat"><span class="val" id="st-messages">0</span><span class="lbl">消息</span></div>
      <div class="stat"><span class="val" id="st-elapsed">0ms</span><span class="lbl">耗时</span></div>
    </div>
    <div id="steps-panel">
      <div id="steps-left">
        <div class="tl-hdr">执行步骤（点击选中）</div>
        <div id="timeline-inner" style="color:var(--muted);font-size:0.78em;padding:10px 12px">等待请求...</div>
      </div>
      <div id="steps-right"><div class="info-placeholder">← 点击左侧步骤查看详细信息</div></div>
    </div>
    <details id="raw-events"><summary>raw SSE events (0)</summary><pre id="raw-pre"></pre></details>
  </div>
</div>

<script>
// ================================================================
// 节点定义 — 默认水平错开：agent 偏左，tools 偏右，end 偏左
//   避免 agent→tools（弧线向右）与 agent→end（直线向左下）重叠
//   用户可拖拽任意节点自定义布局
// ================================================================
const NODES = [
  {id:'start', label:'START',             rx:0.50, ry:0.10, r:22, color:'#8b949e', icon:''},
  {id:'agent', label:'agent\n(LLM 推理)', rx:0.36, ry:0.33, r:42, color:'#58a6ff', icon:'🧠'},
  {id:'tools', label:'tools\n(执行工具)',  rx:0.64, ry:0.58, r:42, color:'#3fb950', icon:'🔧'},
  {id:'end',   label:'END',               rx:0.36, ry:0.83, r:22, color:'#8b949e', icon:''},
];
function computeNodePositions(W, H) {
  const pad = 35; const h = H - pad * 2;
  NODES.forEach(n => { n.x = W * n.rx; n.y = pad + n.ry * h; });
}
const EDGES = [
  {id:'start→agent', from:'start', to:'agent', label:'用户输入', cond:false},
  {id:'agent→tools', from:'agent', to:'tools', label:'有 tool_calls', cond:true},
  {id:'tools→agent', from:'tools', to:'agent', label:'返回结果', cond:false},
  {id:'agent→end',   from:'agent', to:'end',   label:'无 tool_calls → END', cond:true},
];
const nodeMap = Object.fromEntries(NODES.map(n => [n.id, n]));
const edgeMap = Object.fromEntries(EDGES.map(e => [e.id, e]));

// ================================================================
// 全局状态
// ================================================================
// ═══════════════════════════════════════════════════════════════
// 对话线程管理（persist 到 localStorage）
// ═══════════════════════════════════════════════════════════════
const LS_KEY_THREADS = 'agent_ui_threads';   // [{id, name, createdAt}]
const LS_KEY_ACTIVE  = 'agent_ui_active_id'; // 当前活跃 thread id

function _loadThreads() {
  try { return JSON.parse(localStorage.getItem(LS_KEY_THREADS)) || []; }
  catch (_) { return []; }
}
function _saveThreads(list) { localStorage.setItem(LS_KEY_THREADS, JSON.stringify(list)); }

// 初始化：如果没有线程数据，创建一个默认线程
let threads = _loadThreads();
if (threads.length === 0) {
  threads.push({ id: 'web-' + Date.now(), name: '默认对话', createdAt: Date.now() });
  _saveThreads(threads);
}

let threadId = localStorage.getItem(LS_KEY_ACTIVE);
// 如果上次活跃的 thread 已不存在（被删除），回退到第一个
if (!threadId || !threads.find(t => t.id === threadId)) {
  threadId = threads[0].id;
  localStorage.setItem(LS_KEY_ACTIVE, threadId);
}

let currentMode = 'general';
let msgCount = 0, toolCount = 0, cycleCount = 0, eventCount = 0, startTime = 0;
let streamedContent = '', hadToolCall = false, rawEvents = [];
let steps = [], selectedStep = -1;

// ── 持久化状态：模式选择 + 图例勾选框 ──
// 页面刷新/重新打开时恢复上次的设置。
const LS_KEY_MODE = 'agent_ui_mode';
const LS_KEY_PREV = 'agent_ui_show_prev';
const LS_KEY_NEXT = 'agent_ui_show_next';

function _loadPersisted() {
  const mode = localStorage.getItem(LS_KEY_MODE) || 'general';
  currentMode = mode;
  const sel = document.getElementById('mode-select');
  sel.value = mode;
  sel.className = mode === 'dst' ? 'dst-mode' : mode === 'plan' ? 'plan-mode' : '';

  // 图例勾选框：仅在 localStorage 中有明确值时覆盖 HTML 的 checked 默认值。
  // 设置同样的值不会触发 onchange，设置不同的值才会（从而触发持久化写入 + 重绘）。
  const prev = localStorage.getItem(LS_KEY_PREV);
  if (prev !== null) {
    document.getElementById('toggle-prev').checked = prev === 'true';
  }

  const next = localStorage.getItem(LS_KEY_NEXT);
  if (next !== null) {
    document.getElementById('toggle-next').checked = next === 'true';
  }
}

// ── 线程 UI ──
function _activeThread() { return threads.find(t => t.id === threadId); }

function renderThreadDropdown() {
  const sel = document.getElementById('thread-select');
  sel.innerHTML = threads.map(t =>
    `<option value="${t.id}" ${t.id === threadId ? 'selected' : ''}>${escHtml(t.name)}</option>`
  ).join('');
}

function switchThread(id) {
  if (id === threadId) return;
  threadId = id;
  localStorage.setItem(LS_KEY_ACTIVE, threadId);
  renderThreadDropdown();
  resetDebug();
  loadThreadHistory(id);
}

async function loadThreadHistory(id) {
  var container = document.getElementById('messages');
  container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;font-size:0.9em">加载中...</div>';
  try {
    var resp = await fetch('/chat/history/' + encodeURIComponent(id));
    var data = await resp.json();
    if (data.messages && data.messages.length > 0) {
      container.innerHTML = '';
      var stepId = 0;
      var pendingHuman = null;  // 当前处理中的用户气泡
      for (var i = 0; i < data.messages.length; i++) {
        var m = data.messages[i];
        var role = m.type || '';
        if (role === 'human' || role === 'user') {
          // 上一条用户消息的阶段结束标记
          if (pendingHuman && pendingHuman._ownSteps.length > 0) {
            pendingHuman._ownSteps.push({ id: stepId++, phase: 'done', node: 'end', edge: 'agent→end', title: 'END', detail: 'tools_condition → END' });
          }
          pendingHuman = addMsg('human', m.content);
          pendingHuman._ownSteps = [{ id: stepId++, phase: 'input', node: 'start', edge: null, title: '用户输入', detail: String(m.content || '').substring(0, 80) }];
        } else if (role === 'ai') {
          var tc = m.tool_calls || [];
          var content = m.content || '';
          // content 在先（前导文字），tool_calls 在后（决定调工具）
          if (content) {
            if (pendingHuman) {
              pendingHuman._ownSteps.push({ id: stepId++, phase: (tc.length > 0 ? 'agent_final' : 'agent_thinking'), node: 'agent', edge: null, title: (tc.length > 0 ? 'LLM 综合工具结果，最终回答' : 'LLM 直接回答'), detail: content.substring(0, 100), aiContent: content });
            }
          }
          if (tc.length > 0) {
            for (var t = 0; t < tc.length; t++) {
              var tcObj = tc[t];
              if (pendingHuman) {
                pendingHuman._ownSteps.push({ id: stepId++, phase: 'agent_thinking', node: 'agent', edge: t === 0 ? null : 'tools→agent', title: 'LLM 调用工具', detail: tcObj.name + '(' + JSON.stringify(tcObj.args || {}) + ')', toolName: tcObj.name, toolArgs: tcObj.args || {} });
              }
            }
          }
          addMsg('ai', content);
        } else if (role === 'tool') {
          if (pendingHuman) {
            pendingHuman._ownSteps.push({ id: stepId++, phase: 'tool_exec', node: 'tools', edge: 'agent→tools', title: '工具执行完毕', detail: (m.name || 'tool') + ': ' + String(m.content || '').substring(0, 60), toolName: m.name, toolResult: String(m.content || '') });
          }
          var td = document.createElement('div'); td.className = 'msg tool';
          td.innerHTML = '<div class="label">[tool] ' + escHtml(m.name || 'tool') + '</div><div>' + escHtml(String(m.content || '').substring(0, 100)) + ((m.content||'').length > 100 ? '…' : '') + '</div>';
          container.appendChild(td);
        }
      }
      // 最后一条用户消息的结束标记
      if (pendingHuman && pendingHuman._ownSteps.length > 0 && pendingHuman._ownSteps[pendingHuman._ownSteps.length - 1].phase !== 'done') {
        pendingHuman._ownSteps.push({ id: stepId++, phase: 'done', node: 'end', edge: 'agent→end', title: 'END', detail: 'tools_condition → END' });
      }
      container.scrollTop = container.scrollHeight;
    } else {
      var t = _activeThread();
      container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;font-size:0.9em">' + (t ? '已切换到「' + escHtml(t.name) + '」' : '') + '<br>发送消息即可开始对话</div>';
    }
  } catch (_) {
    container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;font-size:0.9em">加载失败，请刷新页面</div>';
  }
  updStats();
}

function newThread() {
  const name = prompt('新对话名称：', '对话 ' + (threads.length + 1));
  if (!name || !name.trim()) return;
  const t = { id: 'web-' + Date.now(), name: name.trim(), createdAt: Date.now() };
  threads.unshift(t);
  _saveThreads(threads);
  threadId = t.id;
  localStorage.setItem(LS_KEY_ACTIVE, threadId);
  renderThreadDropdown();
  document.getElementById('messages').innerHTML =
    '<div style="text-align:center;color:var(--muted);padding:40px;font-size:0.9em">新建对话「' + escHtml(t.name) + '」</div>';
  resetDebug();
  updStats();
}

function renameThread() {
  const t = _activeThread();
  if (!t) return;
  const name = prompt('重命名对话：', t.name);
  if (!name || !name.trim()) return;
  t.name = name.trim();
  _saveThreads(threads);
  renderThreadDropdown();
}

function deleteThread() {
  if (threads.length <= 1) {
    alert('至少保留一个对话线程。');
    return;
  }
  const t = _activeThread();
  if (!confirm('删除对话「' + t.name + '」？\n对话数据仍在数据库中，但前端不再显示此线程。')) return;
  threads = threads.filter(x => x.id !== t.id);
  _saveThreads(threads);
  // 切换到第一个
  threadId = threads[0].id;
  localStorage.setItem(LS_KEY_ACTIVE, threadId);
  renderThreadDropdown();
  document.getElementById('messages').innerHTML =
    '<div style="text-align:center;color:var(--muted);padding:40px;font-size:0.9em">已切换到「' + escHtml(threads[0].name) + '」</div>';
  resetDebug();
  updStats();
}

async function exportThread() {
  const t = _activeThread();
  if (!t) return;
  try {
    const resp = await fetch('/chat/export/' + encodeURIComponent(threadId));
    if (!resp.ok) throw new Error('导出失败: ' + resp.status);
    const data = await resp.json();
    // 将 localStorage 中的线程名写入导出包
    data.thread_name = t.name;
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'agent-chat-' + t.name.replace(/[\\/:*?"<>|]/g, '_') + '-' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  } catch (e) { alert('导出失败: ' + e.message); }
}

function importThread() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async function() {
    const file = input.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.messages || !Array.isArray(data.messages)) throw new Error('文件格式不正确：缺少 messages 数组');
      const name = data.thread_name || file.name.replace(/\.json$/i, '');
      // 提交到后端
      const resp = await fetch('/chat/import', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ thread_name: name, messages: data.messages }),
      });
      if (!resp.ok) { const err = await resp.json(); throw new Error(err.detail || '导入失败'); }
      const result = await resp.json();
      // 创建前端线程条目
      const t = { id: result.thread_id, name: name, createdAt: Date.now() };
      threads.unshift(t);
      _saveThreads(threads);
      threadId = t.id;
      localStorage.setItem(LS_KEY_ACTIVE, threadId);
      renderThreadDropdown();
      // 刷新页面加载导入的对话
      await loadThreadHistory(t.id);
    } catch (e) { alert('导入失败: ' + e.message); }
  };
  input.click();
}

// ================================================================
// Canvas 核心
// ================================================================
const canvas = document.getElementById('graph-canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('graph-canvas-wrap');
const view = { tx:0, ty:0, scale:1.0, dragging:false, dx:0, dy:0 };

function layoutCanvas() {
  const W = wrap.clientWidth, H = wrap.clientHeight;
  if (W < 10 || H < 10) return false;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  computeNodePositions(W, H);
  return true;
}

// ─── 颜色（暗底高对比度）───
// ── 颜色 ── 当前步：边绿 / 出发蓝 / 到达黄 ── 上步：边紫 / 出发暗红 ── 下步：边橙 / 到达浅红 ──
const C_CUR_EDGE = '#3fb950';  // 绿
const C_CUR_FROM = '#58a6ff';  // 蓝
const C_CUR_TO   = '#e3b341';  // 黄
const C_PREV_EDGE = '#a371f7'; // 紫
const C_PREV_FROM = '#8b2500'; // 暗红
const C_NEXT_EDGE = '#d2991d'; // 橙
const C_NEXT_TO   = '#ff9999'; // 浅红
const C_DIM = 'rgba(255,255,255,0.08)';
function hexRgba(h,a){ const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
const TRANS_COLORS = {
  cur_from: C_CUR_FROM, cur_to: C_CUR_TO, cur_edge: C_CUR_EDGE,
  prev_from: C_PREV_FROM, prev_edge: C_PREV_EDGE,
  next_to: C_NEXT_TO, next_edge: C_NEXT_EDGE,
};

// ── 从 steps 中跳过 edge==null 的步骤，找 prev/cur/next 三个 transition ──
function getTransition(step) {
  if (!step||!step.edge) return null;
  const e = edgeMap[step.edge];
  return { from: e?e.from:null, to: step.node||(e?e.to:null), edge: step.edge };
}
function findPrevTransition(idx) { for(let i=idx-1;i>=0;i--) if(steps[i]&&steps[i].edge) return getTransition(steps[i]); return null; }
function findCurTransition(idx) { if(idx>=0&&idx<steps.length&&steps[idx].edge) return getTransition(steps[idx]); return null; }
function findNextTransition(idx) { for(let i=idx+1;i<steps.length;i++) if(steps[i]&&steps[i].edge) return getTransition(steps[i]); return null; }

// 收集节点的所有颜色角色（去重）
function nodeRoles(nid) {
  const cur=findCurTransition(selectedStep), prev=findPrevTransition(selectedStep), next=findNextTransition(selectedStep);
  const showPrev = document.getElementById('toggle-prev').checked;
  const showNext = document.getElementById('toggle-next').checked;
  const roles=new Set();
  if(cur){ if(cur.from===nid) roles.add('cur_from'); if(cur.to===nid) roles.add('cur_to'); }
  if(showPrev&&prev&&prev.from===nid) roles.add('prev_from');
  if(showNext&&next&&next.to===nid)   roles.add('next_to');
  return [...roles];
}

function edgeRoleMap() {
  const showPrev = document.getElementById('toggle-prev').checked;
  const showNext = document.getElementById('toggle-next').checked;
  const cur=findCurTransition(selectedStep), prev=findPrevTransition(selectedStep), next=findNextTransition(selectedStep);
  const m={};
  if(cur&&cur.edge)  m[cur.edge]='cur_edge';
  if(showPrev&&prev&&prev.edge) m[prev.edge]='prev_edge';
  if(showNext&&next&&next.edge) m[next.edge]='next_edge';
  return m;
}

function drawGraph() {
  const W = canvas.width / (window.devicePixelRatio || 1), H = canvas.height / (window.devicePixelRatio || 1);
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.025)'; ctx.lineWidth=1;
  const gs=40*view.scale;
  for(let x=view.tx%gs;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=view.ty%gs;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const tx=x=>x*view.scale+view.tx, ty=y=>y*view.scale+view.ty;
  const erMap=edgeRoleMap();

  // ── 边 ──
  EDGES.forEach(e=>{
    const f=nodeMap[e.from], t=nodeMap[e.to];
    if(!f||!t)return;
    const x1=tx(f.x),y1=ty(f.y),x2=tx(t.x),y2=ty(t.y);
    const role=erMap[e.id];
    const color=role?TRANS_COLORS[role]:C_DIM;
    const lw=role?(role==='cur_edge'?3.5:2.6):1.1;
    ctx.strokeStyle=color; ctx.lineWidth=lw;
    ctx.setLineDash(e.cond?[7,5]:[]);
    if((e.from==='agent'&&e.to==='tools')||(e.from==='tools'&&e.to==='agent')){
      const ox=(e.from==='agent'?55:-55)*view.scale, mx=(x1+x2)/2+ox;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(mx,(y1+y2)/2,x2,y2);ctx.stroke();
      if(role) drawArrow(mx,(y1+y2)/2,x2,y2,color);
    }else{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();if(role)drawArrow((x1+x2)/2,(y1+y2)/2,x2,y2,color);}
    ctx.setLineDash([]);
    if(role&&e.label){
      let lx,ly;
      if(e.from==='agent'&&e.to==='tools'){lx=tx(f.x+75);ly=(ty(f.y)+ty(t.y))/2}
      else if(e.from==='tools'&&e.to==='agent'){lx=tx(f.x-80);ly=(ty(f.y)+ty(t.y))/2}
      else{lx=(x1+x2)/2+18;ly=(y1+y2)/2-6}
      ctx.fillStyle=color;ctx.font=`${Math.round(10*view.scale)}px "Microsoft YaHei",sans-serif`;ctx.textAlign='center';ctx.fillText(e.label,lx,ly);
    }
  });

  // ── 节点（N个角色→N段扇形边框，不混色）──
  NODES.forEach(n=>{
    const x=tx(n.x),y=ty(n.y),r=n.r*view.scale;
    const roles=nodeRoles(n.id);
    if(!roles.length){
      ctx.fillStyle='rgba(13,17,23,0.85)';ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.stroke();
    }else{
      const count=roles.length, seg=2*Math.PI/count;
      let fillRole=null;
      for(const ro of ['cur_from','cur_to','prev_from','next_to']){
        if(roles.includes(ro)){fillRole=ro;break;}
      }
      ctx.fillStyle=fillRole?hexRgba(TRANS_COLORS[fillRole],0.22):'rgba(13,17,23,0.85)';
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
      ctx.lineWidth=3;
      for(let i=0;i<count;i++){
        ctx.strokeStyle=TRANS_COLORS[roles[i]];
        ctx.beginPath();
        ctx.arc(x,y,r,-Math.PI/2+i*seg,-Math.PI/2+(i+1)*seg);
        ctx.stroke();
      }
      const glow=TRANS_COLORS[roles[0]];
      const grd=ctx.createRadialGradient(x,y,r*0.5,x,y,r*1.7);
      grd.addColorStop(0,hexRgba(glow,0.18));grd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(x,y,r*1.7,0,Math.PI*2);ctx.fill();
    }
    if(n.icon&&n.r>24){ctx.fillStyle='#fff';ctx.font=`${Math.round(17*view.scale)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n.icon,x,y-r*0.18);}
    const lines=n.label.split('\n');
    const fs=Math.round((n.r>35?11:10)*view.scale);
    ctx.font=`bold ${fs}px "Microsoft YaHei",sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    const alpha=roles.length||selectedStep<0?1:0.3;
    if(lines.length===1){ctx.fillStyle=`rgba(255,255,255,${alpha})`;ctx.fillText(lines[0],x,y+3)}
    else{ctx.fillStyle=`rgba(255,255,255,${alpha})`;ctx.fillText(lines[0],x,y-8);ctx.font=`${Math.round(fs*0.8)}px "Microsoft YaHei",sans-serif`;ctx.fillStyle=`rgba(200,200,200,${alpha})`;ctx.fillText(lines[1],x,y+9)}
  });

  // ── 循环标记 ──
  if(Object.keys(erMap).length>0){const lx=tx(nodeMap.agent.x+100),ly=ty(nodeMap.agent.y+65);ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font=`bold ${Math.round(10*view.scale)}px "Microsoft YaHei",sans-serif`;ctx.textAlign='left';ctx.fillText('loop x'+toolCount,lx,ly);}

  // ── 图例 ──
  if(selectedStep>=0){
    const ly0=H-48;
    const showPrev=document.getElementById('toggle-prev').checked, showNext=document.getElementById('toggle-next').checked;
    const items=[];
    if(showPrev){items.push({c:C_PREV_FROM,t:'上出发(暗红)'},{c:C_PREV_EDGE,t:'上边(紫)'});}
    items.push({c:C_CUR_FROM,t:'当出发(蓝)'},{c:C_CUR_EDGE,t:'当边(绿)'},{c:C_CUR_TO,t:'当到达(黄)'});
    if(showNext){items.push({c:C_NEXT_EDGE,t:'下边(橙)'},{c:C_NEXT_TO,t:'下到达(浅红)'});}
    ctx.font='9px "Microsoft YaHei",sans-serif';let lx=10;
    items.forEach(item=>{const w=ctx.measureText(item.t).width+22;ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(lx,ly0,w,16);ctx.fillStyle=item.c;ctx.beginPath();ctx.arc(lx+7,ly0+8,3.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ccc';ctx.textAlign='left';ctx.fillText(item.t,lx+16,ly0+11);lx+=w+6;});
  }
}

function drawArrow(x1,y1,x2,y2,color){const a=Math.atan2(y2-y1,x2-x1),s=7*view.scale;ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-s*Math.cos(a-Math.PI/6),y2-s*Math.sin(a-Math.PI/6));ctx.lineTo(x2-s*Math.cos(a+Math.PI/6),y2-s*Math.sin(a+Math.PI/6));ctx.closePath();ctx.fill();}



function redraw() {
  if (!layoutCanvas()) return;
  try { drawGraph(); } catch (e) {}
}

// ─── 缩放/平移/节点拖拽 ───
function zoomGraph(f) { view.scale = Math.max(0.35, Math.min(3, view.scale * f)); redraw(); }
function resetView() { view.tx = 0; view.ty = 0; view.scale = 1; computeNodePositions(canvas.width / (devicePixelRatio || 1), canvas.height / (devicePixelRatio || 1)); redraw(); }

let dragNode = null;
function hitNode(mx, my) {
  const lx = (mx - view.tx) / view.scale, ly = (my - view.ty) / view.scale;
  for (let i = NODES.length - 1; i >= 0; i--) { const n = NODES[i]; if (Math.hypot(lx - n.x, ly - n.y) < n.r + 8) return n; }
  return null;
}
canvas.addEventListener('mousedown', e => {
  const n = hitNode(e.offsetX, e.offsetY);
  if (n) { dragNode = n; canvas.style.cursor = 'grabbing'; e.preventDefault(); return; }
  view.dragging = true; view.dx = e.offsetX - view.tx; view.dy = e.offsetY - view.ty;
});
window.addEventListener('mousemove', e => {
  if (dragNode) { dragNode.x = (e.offsetX - view.tx) / view.scale; dragNode.y = (e.offsetY - view.ty) / view.scale; redraw(); return; }
  if (!view.dragging) return;
  view.tx = e.offsetX - view.dx; view.ty = e.offsetY - view.dy;
  if (wrap.contains(e.target)) redraw();
});
window.addEventListener('mouseup', () => { view.dragging = false; dragNode = null; canvas.style.cursor = 'grab'; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const mx = e.offsetX, my = e.offsetY, f = e.deltaY < 0 ? 1.15 : 0.87;
  const ns = Math.max(0.35, Math.min(3, view.scale * f));
  view.tx = mx - (mx - view.tx) * ns / view.scale;
  view.ty = my - (my - view.ty) * ns / view.scale;
  view.scale = ns;
  redraw();
}, { passive: false });

// ─── 拖拽分割条 ───
let resizeActive = false, resizeStartH = 0;
const handle = document.getElementById('resize-handle');
const graphWrapEl = document.getElementById('graph-canvas-wrap');
handle.addEventListener('mousedown', e => { resizeActive = true; resizeStartH = graphWrapEl.clientHeight - e.clientY; e.preventDefault(); });
window.addEventListener('mousemove', e => {
  if (!resizeActive) return;
  graphWrapEl.style.height = Math.max(80, Math.min(500, resizeStartH + e.clientY)) + 'px';
  clearTimeout(handle._timer); handle._timer = setTimeout(redraw, 50);
});
window.addEventListener('mouseup', () => { resizeActive = false; });

// ─── 初始化 ───
window.addEventListener('resize', () => { clearTimeout(handle._rtimer); handle._rtimer = setTimeout(redraw, 100); });
new ResizeObserver(() => { clearTimeout(handle._otimer); handle._otimer = setTimeout(redraw, 100); }).observe(wrap);
setTimeout(redraw, 200);

// ================================================================
// 发送 & SSE 处理
// ================================================================
async function send() {
  const input = document.getElementById('user-input'), btn = document.getElementById('send-btn');
  const text = input.value.trim(); if (!text) return;
  input.value = ''; input.disabled = true; btn.disabled = true;
  startTime = performance.now();
  toolCount = 0; cycleCount = 0; eventCount = 0; msgCount = 0;
  streamedContent = ''; hadToolCall = false; rawEvents = []; steps = []; selectedStep = -1;
  resetDebug();
  addMsg('human', text);
  var humanBubble = document.getElementById('messages').lastElementChild;
  const aiBubble = addMsg('ai', ''); aiBubble._placeholder = true;
  aiBubble._humanBubble = humanBubble;  // onDone 通过此引用给气泡存步骤快照
  addStep('input', 'start', null, '用户输入', text.substring(0, 80));
  try {
    const resp = await fetch('/chat/stream', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: text, thread_id: threadId, mode: currentMode }) });
    const reader = resp.body.getReader(); const dec = new TextDecoder(); let buf = '';
    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      buf += dec.decode(value, { stream: true }); const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const p = line.slice(6); if (p === '[DONE]') { onDone(aiBubble); break; }
        try { const e = JSON.parse(p); rawEvents.push(e); processEvent(e, aiBubble); eventCount++; } catch (x) { rawEvents.push({ _parse: String(x).substring(0, 60) }); eventCount++; }
      }
    }
  } catch (e) { aiBubble.querySelector('.content').textContent = '[error] ' + e.message; }
  input.disabled = false; btn.disabled = false; input.focus();
  updStats(); updRaw();
}

function processEvent(event, aiBubble) {
  if (!Array.isArray(event) || event.length < 2) return;
  const [mode, payload] = event;
  // messages 模式推送所有消息类型的 chunk（AIMessageChunk + ToolMessage 等），
  // 但 ToolMessage 的内容是工具返回结果，不应拼到 AI 回答文本中。
  // 只取 AI 类型的 chunk 追加到 streamedContent。
  if (mode === 'messages') { const m = Array.isArray(payload) ? payload[0] : payload; const isAIChunk = m && (m.type === 'ai' || m.type === 'AIMessageChunk'); if (isAIChunk && m.content) { streamedContent += m.content; if (aiBubble._placeholder) { aiBubble.querySelector('.content').innerHTML = renderMd(streamedContent); document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight; } } updStats(); return; }
  if (mode === 'updates') {
    for (const [, update] of Object.entries(payload)) {
      if (!update.messages) continue;
      for (const msg of update.messages) {
        const role = msg.type || '', content = msg.content || '';
        if (role === 'ai') {
          // LLM 同时产生 content 和 tool_calls 时，content 在先（前导文字），
          // tool_calls 在后（决定调工具）。步骤按此顺序记录。
          if (content) {
            if (aiBubble._placeholder) { const el = aiBubble.querySelector('.content'); if (el && (!streamedContent || content.length > streamedContent.length)) { el.innerHTML = renderMd(content); aiBubble._placeholder = false; } }
            addStep(hadToolCall ? 'agent_final' : 'agent_thinking', 'agent', hadToolCall ? 'tools→agent' : null, hadToolCall ? 'LLM 综合工具结果，最终回答' : 'LLM 直接回答', content.substring(0, 100), { aiContent: content });
          }
          if (msg.tool_calls && Array.isArray(msg.tool_calls) && msg.tool_calls.length > 0) {
            hadToolCall = true;
            for (const tc of msg.tool_calls) {
            toolCount++; cycleCount++;
            const arrivedVia = hadToolCall ? 'tools→agent' : null;
            addStep('agent_thinking', 'agent', arrivedVia, 'LLM 调用工具', `${tc.name}(${JSON.stringify(tc.args)})`, { toolName: tc.name, toolArgs: tc.args });
          }
          }
        } else if (role === 'tool') {
          const td = document.createElement('div'); td.className = 'msg tool';
          td.innerHTML = `<div class="label">[tool] ${msg.name || 'tool'}</div><div>${escHtml(String(content).substring(0, 100))}${content.length > 100 ? '…' : ''}</div>`;
          document.getElementById('messages').appendChild(td); document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
          addStep('tool_exec', 'tools', 'agent→tools', '工具执行完毕', (msg.name || 'tool') + ': ' + String(content).substring(0, 60), { toolName: msg.name, toolResult: String(content) });
        }
      }
    }
    msgCount = document.getElementById('messages').querySelectorAll('.msg').length; updStats();
  }
}
function onDone(aiBubble) {
  if (aiBubble._placeholder && streamedContent) { aiBubble.querySelector('.content').innerHTML = renderMd(streamedContent); aiBubble._placeholder = false; }
  // 兜底：DOM 渲染未触发时，尝试从步骤数据中提取最后一条 LLM 回复来渲染气泡。
  // 可能原因：框架层的 upates/messages 格式变化、V4 模型新增字段未适配。此时内容已存档，
  // 可回退从步骤中恢复，避免出现“刷新后才看到”的体验。
  if (aiBubble._placeholder) {
    for (let i = steps.length - 1; i >= 0; i--) {
      if (steps[i].aiContent) { aiBubble.querySelector('.content').innerHTML = renderMd(steps[i].aiContent); aiBubble._placeholder = false; break; }
    }
  }
  addStep('done', 'end', 'agent→end', 'END', hadToolCall ? 'tools_condition → END' : 'tools_condition → END');
  document.getElementById('st-elapsed').textContent = Math.round(performance.now() - startTime) + 'ms';
  // 将当前消息的步骤快照存入人类消息气泡的 DOM —— 后续 send() 会清空全局 steps，
  // 存快照到气泡上确保点击任何一条旧消息都能看到该消息对应的行为。
  if (aiBubble._humanBubble) {
    aiBubble._humanBubble._ownSteps = steps.slice();  // 浅拷贝，足够——step 对象不会被修改
  }
  updRaw(); setTimeout(redraw, 100);
}

// ================================================================
// 步骤 & 右侧详情
// ================================================================
function addStep(phase, node, edge, title, detail, extra = {}) {
  const step = { id: steps.length, phase, node, edge, title, detail,
    icon: phase.includes('agent') ? 'agent' : phase.includes('tool') ? 'tool' : phase === 'routing' ? 'route' : 'input',
    ...extra };
  steps.push(step);
  const inner = document.getElementById('timeline-inner');
  if (inner.querySelector('.no-steps')) inner.innerHTML = '';
  const div = document.createElement('div'); div.className = 'tl-step'; div.id = 'tl-' + step.id;
  div.innerHTML = `<div class="tl-num">${step.id + 1}</div><div class="tl-body"><div class="tl-title">${escHtml(title)}</div></div>`;
  div.onclick = () => selectStep(step.id);
  inner.appendChild(div);
  document.getElementById('debug-scroll').scrollTop = document.getElementById('debug-scroll').scrollHeight;
  setTimeout(redraw, 100);
}

// 用给定的步骤数组重建时间线 UI（用于点击历史气泡时显示）
function renderTimelineForSteps(list) {
  steps = list;
  selectedStep = -1;
  // 重建时间线 DOM
  var inner = document.getElementById('timeline-inner');
  inner.innerHTML = '';
  for (var i = 0; i < list.length; i++) {
    var s = list[i];
    var div = document.createElement('div'); div.className = 'tl-step'; div.id = 'tl-' + i;
    div.innerHTML = '<div class="tl-num">' + (i + 1) + '</div><div class="tl-body"><div class="tl-title">' + escHtml(s.title) + '</div></div>';
    div.onclick = (function(idx) { return function() { selectStep(idx); }; })(i);
    inner.appendChild(div);
  }
  // 统计条更新
  var tc = 0, cy = 0;
  for (var j = 0; j < list.length; j++) { if (list[j].phase === 'agent_thinking') { cy++; if (list[j].toolName) tc++; } }
  cycleCount = cy; toolCount = tc; msgCount = document.getElementById('messages').querySelectorAll('.msg').length;
  updStats();
  document.getElementById('st-elapsed').textContent = '(历史)';
  redraw();
  document.getElementById('steps-right').innerHTML = '<div class="info-placeholder">← 点击左侧步骤查看详细信息</div>';
}

function selectStep(idx) {
  selectedStep = idx;
  document.querySelectorAll('.tl-step').forEach(el => el.classList.remove('selected', 'neighbor'));
  for (let i = Math.max(0, idx - 1); i <= Math.min(steps.length - 1, idx + 1); i++) {
    const el = document.getElementById('tl-' + i); if (!el) continue;
    if (i === idx) { el.classList.add('selected'); el.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
    else el.classList.add('neighbor');
  }
  const right = document.getElementById('steps-right');
  if (idx < 0 || idx >= steps.length) { right.innerHTML = '<div class="info-placeholder">← 点击左侧步骤查看详细信息</div>'; redraw(); return; }
  const s = steps[idx];
  const t = getTransition(s);
  const phMap = { input: '用户输入', agent_thinking: 'LLM 推理', tool_exec: '工具执行', agent_final: 'LLM 最终回答', done: '结束' };
  const icons = { agent: '🧠 LLM', tool: '🔧 工具', route: '🔀 路由', input: '👤 用户' };
  let html = `<div class="detail-item"><div class="d-key">阶段</div><div class="d-val text" style="color:var(--accent)">${icons[s.icon] || ''} ${phMap[s.phase] || s.phase}（第${idx + 1}步）</div></div>`;
  if (t) {
    if (t.from) html += `<div class="detail-item"><div class="d-key">发起节点</div><div class="d-val code">${escHtml(t.from)}</div></div>`;
    if (t.edge) html += `<div class="detail-item"><div class="d-key">途径边</div><div class="d-val code">${escHtml(t.edge)}</div></div>`;
    if (t.to) html += `<div class="detail-item"><div class="d-key">到达节点</div><div class="d-val code">${escHtml(t.to)}</div></div>`;
  }
  if (s.toolName) html += `<div class="detail-item"><div class="d-key">调用工具</div><div class="d-val code">${escHtml(s.toolName)}(${escHtml(JSON.stringify(s.toolArgs || {}))})</div></div>`;
  if (s.toolResult) html += `<div class="detail-item"><div class="d-key">工具返回值</div><div class="d-val result">${escHtml(s.toolResult)}</div></div>`;
  if (s.aiContent) html += `<div class="detail-item"><div class="d-key">LLM 输出</div><div class="d-val text">${escHtml(s.aiContent.substring(0, 300))}</div></div>`;
  right.innerHTML = html;
  setTimeout(redraw, 100);
}

// ================================================================
// UI 辅助
// ================================================================
function addMsg(role, text) { const d = document.createElement('div'); d.className = 'msg ' + role; const labels = { human: '👤 YOU', ai: '🤖 Agent', tool: '🔧 Tool' }; const rendered = role === 'ai' ? renderMd(text) : escHtml(text); d.innerHTML = `<div class="label">${labels[role] || role}</div><div class="content">${rendered}</div>`; if (role === 'human') { d.onclick = function() { selectUserMessage(d); }; d.style.cursor = 'pointer'; } document.getElementById('messages').appendChild(d); document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight; return d; }

// ── 用户气泡点击：用该消息的步骤替换右侧时间线 ──
function selectUserMessage(bubble) {
  var ownedSteps = bubble._ownSteps;
  if (!ownedSteps || !ownedSteps.length) {
    var right = document.getElementById('steps-right');
    right.innerHTML = '<div class="info-placeholder">此消息无步骤数据</div>';
    return;
  }
  renderTimelineForSteps(ownedSteps);
}
function resetDebug() { document.getElementById('timeline-inner').innerHTML = '<span class="no-steps" style="color:var(--muted)">处理中...</span>'; document.getElementById('steps-right').innerHTML = '<div class="info-placeholder">← 点击左侧步骤查看详细信息</div>'; document.getElementById('raw-pre').textContent = ''; document.getElementById('st-cycles').textContent = '0'; document.getElementById('st-tools').textContent = '0'; document.getElementById('st-messages').textContent = '0'; document.getElementById('st-elapsed').textContent = '0ms'; steps = []; selectedStep = -1; setTimeout(redraw, 100); }
function updStats() { document.getElementById('st-cycles').textContent = cycleCount; document.getElementById('st-tools').textContent = toolCount; document.getElementById('st-messages').textContent = msgCount; }
function updRaw() { document.getElementById('raw-pre').textContent = rawEvents.map(e => JSON.stringify(e)).join('\n'); const s = document.querySelector('#raw-events summary'); if (s) s.textContent = 'raw SSE events (' + eventCount + ')'; }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ================================================================
// Markdown 渲染 —— 流式安全的轻量解析
// ================================================================
// 核心约束：流式输出时文本不完整，解析不能崩溃。
// 策略：先完整 HTML 转义，再对完整结构（代码块、表格）做块级
//       正则匹配，最后对行内元素（code/bold）做替换。
//       未闭合的代码块 → 保留反引号为字面文本，不尝试渲染。

function renderMd(text) {
  // Step 0: HTML 转义 —— 防止用户输入中的 <script> 等
  let html = escHtml(text);

  // Step 1: 块级结构 —— 代码块（```...```）
  // 用 replace 回调，完整匹配的代码块才渲染，不完整的保留原文
  html = html.replace(/(^|\n)```(\w*)\n([\s\S]*?)```(?=\n|$)/g, (_m, nl, lang, code) => {
    const cls = lang ? ' class="language-' + escHtml(lang) + '"' : '';
    return nl + '<pre><code' + cls + '>' + code.trimEnd() + '</code></pre>';
  });

  // Step 2: 表格 —— 至少 2 行，每行以 | 开头
  html = html.replace(/((?:^|\n)(?:\|[^\n]+\|\n){2,})/g, (_m, block) => {
    const lines = block.trim().split('\n');
    if (lines.length < 2) return block;
    let tbl = '<table>';
    lines.forEach((line, i) => {
      const cells = line.split('|').filter(c => c.trim() !== '' || line.startsWith('|'));
      const tag = i === 0 ? 'th' : 'td';
      tbl += '<tr>' + cells.map(c => '<' + tag + '>' + inlineMd(c.trim()) + '</' + tag + '>').join('') + '</tr>';
    });
    tbl += '</table>';
    return '\n' + tbl + '\n';
  });

  // Step 3: 标题 —— ## 和 ###（放在代码块之后，避免匹配到代码里的 #）
  html = html.replace(/^#### (.+)$/gm, '<h5>$1</h5>');
  html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');

  // Step 4: 水平线
  html = html.replace(/^---$/gm, '<hr>');

  // Step 5: 有序列表和无序列表（连续行）
  // 无序列表
  html = html.replace(/((?:^- .+\n?)+)/gm, (_m, block) => {
    const items = block.trim().split('\n').filter(l => l.startsWith('- '));
    return '<ul>' + items.map(l => '<li>' + inlineMd(l.slice(2)) + '</li>').join('') + '</ul>';
  });
  // 有序列表
  html = html.replace(/((?:^\d+\. .+\n?)+)/gm, (_m, block) => {
    const items = block.trim().split('\n').filter(l => /^\d+\./.test(l));
    return '<ol>' + items.map(l => '<li>' + inlineMd(l.replace(/^\d+\.\s*/, '')) + '</li>').join('') + '</ol>';
  });

  // Step 6: ASCII 框图 —— 连续 ≥2 行含制表符的块，用虚线 pre 包裹
  const boxChars = /[┌┐└┘├┤┬┴┼│─━▶▼▲●○◆◇★☆█▌▐▀▄■□▪▫◄◀]|──|┌─|└─|├─|┬─|┴─/;
  html = html.replace(/((?:^.*[─-╿].*\n?){2,})/gm, (_m, block) => {
    return '\n<pre class="ascii-art">' + block.trimEnd() + '</pre>\n';
  });

  // Step 7: 行内元素
  html = inlineMd(html);

  // Step 8: 段落 —— 连续两个换行之间的纯文本（不在任何块级标签内）
  // 简单处理：把没有标签包裹的换行分隔文本用 <p> 包裹
  html = html.replace(/\n\n+/g, '</p><p>');
  html = '<p>' + html + '</p>';
  // 清理空段落和块级标签与 <p> 的冲突
  html = html.replace(/<p><(h[3-5]|pre|table|ul|ol|hr)/g, '<$1');
  html = html.replace(/(<\/pre>|<\/table>|<\/ul>|<\/ol>|<\/h[3-5]>|<\/?hr>?)<\/p>/g, '$1');

  return html;
}

function inlineMd(text) {
  // 行内代码 `...`
  let out = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // 加粗 **...**
  out = out.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // 斜体 *...*
  out = out.replace(/\*(.+?)\*/g, '<em>$1</em>');
  return out;
}
